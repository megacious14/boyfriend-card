<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Will You Be My Boyfriend?</title>

<style>

body{
font-family: Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Bigger title */

h1{
color:white;
font-size:42px;
margin-bottom:10px;
}

/* BIGGER IMAGE */

img{
width:350px;
border-radius:20px;
margin:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* Buttons */

button{
padding:18px 35px;
font-size:22px;
margin:10px;
border:none;
border-radius:14px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#28a745;
color:white;
}

#no{
background:#ff4d4d;
color:white;
}

/* Video section */

#videoContainer{
display:none;
margin-top:20px;
}

video{
width:360px;
border-radius:15px;
}

/* Hearts animation */

.heart{
position:fixed;
color:red;
font-size:28px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<h1>Will You Be My Boyfriend? 💗</h1>

<img src="IMG_3280.jpeg">

<div>
<button id="yes">YES 💗</button>
<button id="no">NO 😭</button>
</div>

<div id="videoContainer">
<h2>You said YES 🙃💗</h2>

<video id="video" controls>
<source src="We Are Young.mp4" type="video/mp4">
</video>

</div>

<!-- Background Music -->

<audio id="bgMusic" loop autoplay>
<source src="Ariana Grande - Hampstead (lyric visualizer).mp3" type="audio/mp3">
</audio>

<script>

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const video = document.getElementById("video");
const videoContainer = document.getElementById("videoContainer");
const music = document.getElementById("bgMusic");

/* Make music play when page loads */

window.onload = function(){
music.play().catch(()=>{});
}

/* NO button runs away */

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveNo(){

const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 50);

noBtn.style.position="absolute";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

/* YES button */

yesBtn.onclick = function(){

videoContainer.style.display="block";

video.play();

startHearts();

}

/* Floating hearts */

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

},300);

}

</script>

</body>
</html>
