<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Will You Be My Boyfriend?</title>

<style>

body{
font-family: Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

h1{
color:white;
font-size:40px;
}

img{
width:220px;
border-radius:20px;
margin:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
padding:15px 30px;
font-size:22px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#28a745;
color:white;
}

#no{
background:#ff4d4d;
color:white;
}

#videoContainer{
display:none;
margin-top:20px;
}

video{
width:340px;
border-radius:15px;
}

.heart{
position:fixed;
color:red;
font-size:25px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<h1>Will You Be My Boyfriend? 💗</h1>

<img src="IMG_3280.jpeg">

<div>
<button id="yes">YES!!! 💗</button>
<button id="no">NO 🫩</button>
</div>

<div id="videoContainer">
<h2>You said YES 😉</h2>
<video id="video" controls>
<source src="We Are Young.mp4" type="video/mp4">
</video>
</div>

<audio id="bgMusic" autoplay loop>
<source src="Ariana Grande - Hampstead (lyric visualizer).mp3" type="audio/mp3">
</audio>

<script>

let yesSize = 1;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const video = document.getElementById("video");
const videoContainer = document.getElementById("videoContainer");
const music = document.getElementById("bgMusic");


/* Helps music start on phone */
document.body.addEventListener("click", function(){
music.play().catch(()=>{});
}, {once:true});


/* NO button runs away */

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("touchstart", moveNoButton);

function moveNoButton(){

const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 50);

noBtn.style.position = "absolute";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}


/* If NO is somehow clicked */

noBtn.onclick = function(){

yesSize += 0.5;

yesBtn.style.transform = "scale(" + yesSize + ")";

}


/* YES button */

yesBtn.onclick = function(){

yesBtn.style.position = "fixed";
yesBtn.style.top = "50%";
yesBtn.style.left = "50%";

yesBtn.style.transform = "translate(-50%,-50%) scale(10)";
yesBtn.style.transition = "0.6s";

setTimeout(()=>{

videoContainer.style.display="block";
video.play();
startHearts();

},700);

};


/* Floating hearts */

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

},300);

}

</script>

</body>
</html>
