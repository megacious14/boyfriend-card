<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Will You Be My Boyfriend?</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

/* BACKGROUND IMAGE */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("IMG_3292.jpeg") center/cover no-repeat;
filter:blur(12px) brightness(0.25);
z-index:-1;
}

.container{
text-align:center;
backdrop-filter:blur(6px);
padding:20px;
border-radius:20px;
}

h1{
font-family:'Pacifico', cursive;
font-size:55px;
text-shadow:0 0 25px rgba(255,255,255,0.7);
}

img{
width:320px;
border-radius:20px;
margin:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.9);
}

button{
padding:18px 35px;
font-size:22px;
margin:12px;
border:none;
border-radius:14px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#22c55e;
color:white;
box-shadow:0 0 20px rgba(34,197,94,0.8);
}

#no{
background:#ef4444;
color:white;
}

#videoContainer{
display:none;
margin-top:20px;
}

video{
width:340px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.8);
}

#finalMessage{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
text-align:center;
font-family:'Pacifico', cursive;
text-shadow:0 0 30px rgba(255,255,255,0.9);
}

.heart, .confetti{
position:fixed;
bottom:-20px;
font-size:25px;
animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h1>Will You Be My Boyfriend? 🖤</h1>

<img src="IMG_3280.jpeg">

<div>
<button id="yes">YES 💗</button>
<button id="no">NO 🫩</button>
</div>

<div id="videoContainer">
<video id="video" poster="IMG_3280.jpeg">
<source src="We Are Young.mp4" type="video/mp4">
</video>
</div>

</div>

<div id="finalMessage">
You said YES 🙃💗<br>I love you 🖤
</div>

<!-- FIXED MUSIC -->
<audio id="bgMusic" loop>
<source src="hampstead.mp3" type="audio/mp3">
</audio>

<script>

const music = document.getElementById("bgMusic");
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const video = document.getElementById("video");
const videoContainer = document.getElementById("videoContainer");
const finalMessage = document.getElementById("finalMessage");

/* MUSIC START */

function startMusic(){
music.play().catch(()=>{});
document.removeEventListener("click", startMusic);
document.removeEventListener("touchstart", startMusic);
}

document.addEventListener("click", startMusic);
document.addEventListener("touchstart", startMusic);

/* NO RUNS AWAY */

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveNo(){
const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 50);

noBtn.style.position="absolute";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";
}

/* YES CLICK */

yesBtn.onclick = function(){
videoContainer.style.display="block";
video.play();
startHearts();
};

/* HEARTS */

function startHearts(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),5000);
},300);
}

/* AFTER VIDEO */

video.onended = function(){

videoContainer.style.display="none";

for(let i=0;i<80;i++){
let conf=document.createElement("div");
conf.className="confetti";
conf.innerHTML = ["🎉","🖤","💗","✨"][Math.floor(Math.random()*4)];
conf.style.left=Math.random()*100+"vw";
document.body.appendChild(conf);

setTimeout(()=>conf.remove(),5000);
}

finalMessage.style.display="block";

};

</script>

</body>
</html>
