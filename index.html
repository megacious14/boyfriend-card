<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Will You Be My Boyfriend?</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

/* BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("IMG_3292.jpeg") center/cover no-repeat;
filter:blur(12px) brightness(0.25);
z-index:-1;
}

.container{
text-align:center;
backdrop-filter:blur(6px);
padding:20px;
border-radius:20px;
}

/* ✍🏽 TYPEWRITER FONT */

h1{
font-family:'Special Elite', cursive;
font-size:50px;
letter-spacing:2px;
}

/* IMAGE */

img{
width:320px;
border-radius:20px;
margin:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.9);
}

/* BUTTONS */

button{
padding:18px 35px;
font-size:22px;
margin:12px;
border:none;
border-radius:14px;
cursor:pointer;
}

#yes{
background:#22c55e;
color:white;
box-shadow:0 0 20px rgba(34,197,94,0.8);
}

#no{
background:#ef4444;
color:white;
}

/* VIDEO */

#videoContainer{
display:none;
margin-top:20px;
}

video{
width:340px;
border-radius:15px;
}

/* FINAL MESSAGE */

#finalMessage{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
text-align:center;
font-weight:bold;
}

/* HEARTS */

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container" id="mainContent">

<h1>Will you be my boyfriend? 🖤</h1>

<img src="IMG_3280.jpeg">

<div>
<button id="yes">YES 🙃💗</button>
<button id="no">NO 🫩</button>
</div>

<div id="videoContainer">
<video id="video" poster="IMG_3280.jpeg">
<source src="We Are Young.mp4" type="video/mp4">
</video>
</div>

</div>

<!-- FINAL MESSAGE -->
<div id="finalMessage"></div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="hampstead.mp3" type="audio/mp3">
</audio>

<script>

const music = document.getElementById("bgMusic");
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const video = document.getElementById("video");
const videoContainer = document.getElementById("videoContainer");
const finalMessage = document.getElementById("finalMessage");
const mainContent = document.getElementById("mainContent");

/* START MUSIC */

function startMusic(){
music.play().catch(()=>{});
document.removeEventListener("click", startMusic);
document.removeEventListener("touchstart", startMusic);
}

document.addEventListener("click", startMusic);
document.addEventListener("touchstart", startMusic);

/* 💗 HEARTS START IMMEDIATELY */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},500);

/* NO RUNS */

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveNo(){
const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 50);

noBtn.style.position="absolute";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";
}

/* YES */

yesBtn.onclick = function(){
videoContainer.style.display="block";
video.play();
};

/* AFTER VIDEO */

video.onended = function(){

mainContent.style.display="none";
finalMessage.style.display="block";

/* ⌨️ TYPING EFFECT */

const text = "You said YES Nana Wiredu Gyan 🙃💗 I love you 💗";
let i = 0;

function type(){
if(i < text.length){
finalMessage.innerHTML += text.charAt(i);
i++;
setTimeout(type, 50);
}
}

type();

};

</script>

</body>
</html>
